# docker-compose.yml
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: python_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src  # Hot reload backend source
    environment:
      - ENV=development
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/app:/app  # Sync frontend app source for Vite hot-reload
      - /app/node_modules # Prevents local node_modules from wiping out container packages
    environment:
      - CHOKIDAR_USEPOLLING=true # Helps file watching on Windows/macOS bind mounts
    stdin_open: true # Keeps interactive processes running smoothly
    tty: true
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
